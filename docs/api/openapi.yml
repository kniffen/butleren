{
  "openapi": "3.0.2",
  "info": {
    "title": "Butleren API",
    "version": "1.0.0",
    "description": "Butleren API is a RESTful API that provides access to Butleren's services.\n"
  },
  "paths": {
    "/api/discord/guilds": {
      "get": {
        "summary": "Get all guilds",
        "responses": {
          "200": {
            "description": "A list of guilds",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/Guild"
                  }
                }
              }
            }
          },
          "500": {
            "description": "Internal server error"
          }
        }
      }
    },
    "/api/discord/guilds/{guild}": {
      "get": {
        "summary": "Get a guild by id",
        "parameters": [
          {
            "name": "guild",
            "example": "123456789012345678",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            },
            "description": "The guild's discord id"
          }
        ],
        "responses": {
          "200": {
            "description": "A guild",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Guild"
                }
              }
            }
          },
          "404": {
            "description": "Guild not found"
          },
          "500": {
            "description": "Internal server error"
          }
        }
      }
    },
    "/api/discord/guilds/{guild}/settings": {
      "put": {
        "summary": "Update a guild's settings",
        "parameters": [
          {
            "name": "guild",
            "example": "123456789012345678",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            },
            "description": "The guild's discord id"
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/GuildSettings"
              }
            }
          }
        },
        "responses": {
          "204": {
            "description": "Guild settings updated"
          },
          "404": {
            "description": "Guild not found"
          },
          "500": {
            "description": "Internal server error"
          }
        }
      }
    },
    "/api/modules/{guild}": {
      "get": {
        "summary": "Get all modules",
        "parameters": [
          {
            "name": "guild",
            "example": "123456789012345678",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            },
            "description": "The guild's discord id"
          }
        ],
        "responses": {
          "200": {
            "description": "A list of modules",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/Module"
                  }
                }
              }
            }
          },
          "500": {
            "description": "Internal server error"
          }
        }
      }
    },
    "/api/modules/{guild}/{slug}/settings": {
      "put": {
        "summary": "Update a module's settings",
        "parameters": [
          {
            "name": "guild",
            "example": "123456789012345678",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            },
            "description": "The guild's discord id"
          },
          {
            "name": "slug",
            "example": "foo",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string"
            },
            "description": "The module slug"
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ModuleSettings"
              }
            }
          }
        },
        "responses": {
          "204": {
            "description": "Module settings updated"
          },
          "404": {
            "description": "Module not found"
          },
          "500": {
            "description": "Internal server error"
          }
        }
      }
    }
  },
  "components": {
    "schemas": {
      "UserSettings": {
        "type": "object",
        "properties": {
          "location": {
            "type": "string",
            "description": "The user's location",
            "example": "Germany"
          }
        },
        "required": [
          "id"
        ]
      },
      "Module": {
        "type": "object",
        "properties": {
          "slug": {
            "type": "string",
            "description": "The module slug",
            "example": "foo"
          },
          "name": {
            "type": "string",
            "description": "The module name",
            "example": "Foo"
          },
          "description": {
            "type": "string",
            "description": "The module description",
            "example": "This is a foo module"
          },
          "isLocked": {
            "type": "boolean",
            "description": "Whether the module is locked",
            "example": false
          },
          "settings": {
            "type": "object",
            "description": "The module settings",
            "$ref": "#/components/schemas/ModuleSettings"
          }
        },
        "required": [
          "slug",
          "name",
          "description",
          "isLocked",
          "settings"
        ]
      },
      "ModuleSettings": {
        "type": "object",
        "properties": {
          "isEnabled": {
            "type": "boolean",
            "description": "Whether the module is enabled",
            "example": true
          }
        },
        "required": [
          "isEnabled"
        ]
      },
      "GuildSettings": {
        "type": "object",
        "properties": {
          "nickname": {
            "type": "string",
            "description": "The nickname of bot in the guild"
          },
          "color": {
            "type": "string",
            "description": "The color of the embeds",
            "example": "#FF0000"
          }
        },
        "required": [
          "color"
        ]
      },
      "Guild": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "description": "The guild's discord id",
            "example": "123456789012345678"
          },
          "name": {
            "type": "string",
            "description": "The guild name"
          },
          "iconURL": {
            "type": "string",
            "nullable": true,
            "description": "The guild icon URL"
          },
          "settings": {
            "type": "object",
            "description": "The guild settings",
            "$ref": "#/components/schemas/GuildSettings"
          },
          "channels": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "id": {
                  "type": "string"
                },
                "name": {
                  "type": "string"
                },
                "type": {
                  "type": "enum",
                  "enum": [
                    "ANNOUNCEMENT",
                    "TEXT",
                    "VOICE",
                    "CATEGORY"
                  ]
                }
              }
            }
          },
          "roles": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "id": {
                  "type": "string"
                },
                "name": {
                  "type": "string"
                }
              }
            }
          }
        },
        "required": [
          "id",
          "name",
          "iconURL"
        ]
      }
    }
  }
}
